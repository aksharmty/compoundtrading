<!-- MODAL POPUP -->

<style>

#promoModal{
    display:none;
    position:fixed;
    z-index:999999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
}

#promoBox{
    position:relative;
    width:90%;
    max-width:500px;
    margin:5vh auto;
    background:#ffffff;
    border-radius:18px;
    overflow:hidden;
    text-align:center;
    animation:popupFade 0.3s ease;
}

#promoClose{
    position:absolute;
    top:10px;
    right:12px;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#ff3b30;
    color:#fff;
    border:none;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
    z-index:10;
}

#promoImage{
    width:100%;
    max-height:70vh;
    object-fit:contain;
    display:block;
    margin:auto;
    background:#fff;
}

#promoContent{
    padding:20px;
}

#promoBtn{
    display:inline-block;
    background:#007F73;
    color:#fff;
    padding:14px 28px;
    border-radius:10px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

#promoBtn:hover{
    opacity:0.9;
}

@keyframes popupFade{
    from{
        transform:scale(0.9);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@media(max-width:768px){

    #promoBox{
        width:90%;
        margin:4vh auto;
    }

    #promoBtn{
        width:90%;
        display:block;
        margin:auto;
    }

}

</style>

<div id="promoModal">

    <div id="promoBox">

        <button id="promoClose">&times;</button>

        <a href="https://compoundtrading.adquash.com/kucoin-dca-bot.html" target="_blank">

            <img 
                id="promoImage"
                src="https://aksharhanumandham.in/ads/kucoin.png"
                alt="Promo Image"
            >

        </a>

        <div id="promoContent">

            <a 
                id="promoBtn"
                href="https://compoundtrading.adquash.com/kucoin-dca-bot.html"
                target="_blank"
            >
                Visit Now
            </a>

        </div>

    </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    // current page path

    let currentPage = window.location.pathname;

    // जिस page पर popup नहीं दिखाना

    if(currentPage.indexOf("kucoin-dca-bot.html") === -1){

        const promoModal = document.getElementById("promoModal");

        const closeBtn = document.getElementById("promoClose");

        function openPromo(){

            promoModal.style.display = "block";

        }

        function closePromo(){

            promoModal.style.display = "none";

        }

        closeBtn.onclick = closePromo;

        window.onclick = function(e){

            if(e.target == promoModal){

                closePromo();

            }

        }

        // first popup after 5 seconds

        setTimeout(openPromo,5000);

        // repeat every 5 minutes

        setInterval(openPromo,300000);

    }

});

</script>

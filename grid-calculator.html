                    <div class="col-md-12">
  <h1 style="text-align:center;">Grid Price Drop Calculator</h1>
   <style>
   .box { border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
    input[type="number"] { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
    label { font-weight: 600; display:block; margin-top:10px }
    button { padding: 10px 16px; font-size: 16px; cursor: pointer; margin-top: 12px }
    .output { margin-top: 20px; padding: 15px; background: #f7f7f7; border-radius: 10px; }

    table th, table td { border:1px solid #ddd; padding:6px 8px; text-align:right }

  </style>
  <div class="box">
      <div class="col">
        <label>Last Buy Gap (%)</label>
        <input type="number" id="gap" value="1" step="0.1" min="0">
      </div>
      <div class="col">
        <label>Buy Amount Increase (%)</label>
        <input type="number" id="inc" value="1" step="0.1" min="0">
      </div>
    
       <div class="col">
        <label>Total Capital (₹)</label>
        <input type="number" id="capital" value="100000" step="any" min="0">
      </div>
      <div class="col">
        <label>First Buy (% of Capital)</label>
        <input type="number" id="first" value="1" step="0.1" min="0">
      </div>
    <div class="col">
    <label>TDS (%)</label>
    <input type="number" id="tds" value="1" step="0.01" min="0">
</div>

<div class="col">
    <label>Fee (%)</label>
    <input type="number" id="fee" value="0.1" step="0.01" min="0">
</div>
    <div class="controls">
      <button id="calcBtn">Calculate</button>
      <button id="exportCsvBtn">Export CSV</button>
    </div>

    <div id="result" class="output"></div>
  </div>

 <script>
let lastRun = {
    steps: [],
    buyAmounts: [],
    charges: [],
    prices: [],
    cumulative: [],
    capital: 0
};

function calc() {

    const gap = parseFloat(document.getElementById('gap').value) / 100;
    const inc = parseFloat(document.getElementById('inc').value) / 100;
    const capital = parseFloat(document.getElementById('capital').value);
    const firstPct = parseFloat(document.getElementById('first').value) / 100;
    const tds = parseFloat(document.getElementById('tds').value) / 100;
    const fee = parseFloat(document.getElementById('fee').value) / 100;

    if (
        !isFinite(gap) ||
        !isFinite(inc) ||
        !isFinite(capital) ||
        !isFinite(firstPct) ||
        capital <= 0 ||
        firstPct <= 0
    ) {
        document.getElementById('result').innerHTML =
            '<span class="small">Please enter valid positive numbers.</span>';
        return;
    }

    const buyAmounts = [];
    const prices = [];
    const cumulative = [];
    const charges = [];

    let used = 0;
    let buyAmount = capital * firstPct;
    let price = 1;
    let step = 0;

    while (used + (buyAmount * (1 + tds + fee)) <= capital) {

        const charge = buyAmount * (tds + fee);
        const actualCost = buyAmount + charge;

        used += actualCost;
        step++;

        buyAmounts.push(buyAmount);
        prices.push(price);
        cumulative.push(used);
        charges.push(charge);

        price = price * (1 - gap);
        buyAmount = buyAmount * (1 + inc);

        if (step > 1000000) break;
    }

    const totalDownPct = (1 - price) * 100;

    const totalCharges = charges.reduce((a, b) => a + b, 0);
    const investedOnly = used - totalCharges;

    lastRun = {
        steps: Array.from({ length: step }, (_, i) => i + 1),
        buyAmounts: buyAmounts.slice(),
        charges: charges.slice(),
        prices: prices.slice(),
        cumulative: cumulative.slice(),
        capital
    };

    let html = `
        <div><b>Total Buys:</b> ${step}</div>
        <div><b>Total Down Covered:</b> ${totalDownPct.toFixed(2)}%</div>
        <div><b>Capital Used:</b> ₹${investedOnly.toFixed(2)}</div>
        <div><b>Total Fee + TDS:</b> ₹${totalCharges.toFixed(2)}</div>
        <div><b>Total Cost:</b> ₹${used.toFixed(2)}</div>
    `;

    if (step > 0) {

        html += `
        <div style="overflow:auto; max-height:420px; margin-top:10px">
            <table>
                <thead>
                    <tr>
                        <th>Step</th>
                        <th>Price</th>
                        <th>Buy Amount (₹)</th>
                        <th>Fee + TDS (₹)</th>
                        <th>Total Cost (₹)</th>
                        <th>Cumulative (₹)</th>
                    </tr>
                </thead>
                <tbody>
        `;

        for (let i = 0; i < step; i++) {

            const rowCost = buyAmounts[i] + charges[i];

            html += `
                <tr>
                    <td style="text-align:center">${i + 1}</td>
                    <td>${prices[i].toFixed(6)}</td>
                    <td>${buyAmounts[i].toFixed(2)}</td>
                    <td>${charges[i].toFixed(2)}</td>
                    <td>${rowCost.toFixed(2)}</td>
                    <td>${cumulative[i].toFixed(2)}</td>
                </tr>
            `;
        }

        html += `
                </tbody>
            </table>
        </div>
        `;
    }

    document.getElementById('result').innerHTML = html;
}

function exportCsv() {

    if (!lastRun.steps.length) {
        alert('No data to export');
        return;
    }

    let csv =
        'Step,Price,BuyAmount,FeeTDS,TotalCost,Cumulative\n';

    for (let i = 0; i < lastRun.steps.length; i++) {

        const totalCost =
            lastRun.buyAmounts[i] + lastRun.charges[i];

        csv +=
            `${lastRun.steps[i]},` +
            `${lastRun.prices[i].toFixed(6)},` +
            `${lastRun.buyAmounts[i].toFixed(2)},` +
            `${lastRun.charges[i].toFixed(2)},` +
            `${totalCost.toFixed(2)},` +
            `${lastRun.cumulative[i].toFixed(2)}\n`;
    }

    const blob = new Blob([csv], {
        type: 'text/csv'
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = 'dca_prices.csv';

    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);
}

document.getElementById('calcBtn')
    .addEventListener('click', calc);

document.getElementById('exportCsvBtn')
    .addEventListener('click', exportCsv);

window.addEventListener('load', calc);
</script>

      }

    function loadHTML(elementId, file) {

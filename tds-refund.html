<h1>Crypto Target & Tax Calculator</h1>
<a target="_blank" href="crypto-compounding.html" style="text-decoration:none;color:red;">View Compounding Table for 1 crore</a><br>
<div class="box">

<label>Buy Amount (₹)</label>
<input type="number" id="buyAmount" value="100">

<label>Buy Fee %</label>
<input type="number" id="buyFee" value="0.1" step="0.01">

<label>Buy TDS %</label>
<input type="number" id="buyTDS" value="1" step="0.01">

<label>Sell Fee %</label>
<input type="number" id="sellFee" value="0.1" step="0.01">

<label>Sell TDS %</label>
<input type="number" id="sellTDS" value="1" step="0.01">

<label>Crypto Tax %</label>
<input type="number" id="taxRate" value="31.2" step="0.1">

<label>Target Profit %</label>
<input type="number" id="target" value="3" step="0.1">

<div class="result" id="summary"></div>

</div>

<div class="box">

<h2>Main Result</h2>

<table>

<thead>
<tr>
<th>Item</th>
<th>Value</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="box">

<h2>Safe No Extra Tax Range</h2>

<table>

<thead>

<tr>
<th>Target %</th>
<th>Immediate +/-</th>
<th>Immediate +/- %</th>
<th>Immediate Account</th>
<th>Total TDS</th>
<th>Year-End Tax</th>
<th>Extra Tax</th>
<th>TDS Refund</th>
</tr>

</thead>

<tbody id="rangeTable"></tbody>

</table>

</div>

<script>

function calc(){

    let buyAmount = parseFloat(document.getElementById("buyAmount").value);

    let buyFee = parseFloat(document.getElementById("buyFee").value)/100;
    let buyTDS = parseFloat(document.getElementById("buyTDS").value)/100;

    let sellFee = parseFloat(document.getElementById("sellFee").value)/100;
    let sellTDS = parseFloat(document.getElementById("sellTDS").value)/100;

    let taxRate = parseFloat(document.getElementById("taxRate").value)/100;

    let target = parseFloat(document.getElementById("target").value)/100;

    // Break-even %

    let breakeven =
        ((1 + buyFee + buyTDS) / (1 - sellFee - sellTDS) - 1) * 100;

    // Max No Extra Tax %

    let approxMaxNoTax =
        ((buyTDS + sellTDS) / taxRate) * 100;

    let suggested = breakeven + 0.5;

    document.getElementById("summary").innerHTML = `

        Exact Break-even:
        <span class="green">${breakeven.toFixed(3)}%</span>

        <br>

        Suggested Safe Target:
        <span class="green">${suggested.toFixed(2)}%</span>

        <br>

        Max Range With
        <span class="orange">0 Extra Tax Payable</span>:

        <span class="orange">
            ~${approxMaxNoTax.toFixed(2)}%
        </span>

    `;

    // MAIN RESULT

    let sellAmount = buyAmount * (1 + target);

    let buyFeeAmt = buyAmount * buyFee;
    let buyTDSAmt = buyAmount * buyTDS;

    let sellFeeAmt = sellAmount * sellFee;
    let sellTDSAmt = sellAmount * sellTDS;

    let totalTDS = buyTDSAmt + sellTDSAmt;

    let immediateAccount =
        sellAmount
        - sellFeeAmt
        - sellTDSAmt
        - buyFeeAmt
        - buyTDSAmt;

    let accountChange = immediateAccount - buyAmount;

    let immediatePercent =
        (accountChange / buyAmount) * 100;

    let grossProfit = sellAmount - buyAmount;

    let totalTax = grossProfit * taxRate;

    let extraTax = Math.max(0, totalTax - totalTDS);

    let refund = Math.max(0, totalTDS - totalTax);

    document.getElementById("tableBody").innerHTML = `

        <tr>
            <td>Immediate +/-</td>
            <td class="${accountChange>=0?'green':'red'}">
                ₹${accountChange.toFixed(3)}
            </td>
        </tr>

        <tr>
            <td>Immediate Account</td>
            <td>
                ₹${immediateAccount.toFixed(3)}
            </td>
        </tr>

        <tr>
            <td>Immediate Account +/- ₹</td>
            <td class="${accountChange>=0?'green':'red'}">
                ${accountChange>=0?'+':''}₹${accountChange.toFixed(3)}
            </td>
        </tr>

        <tr>
            <td>Total TDS</td>
            <td>
                ₹${totalTDS.toFixed(3)}
            </td>
        </tr>

        <tr>
            <td>Year-End Tax</td>
            <td>
                ₹${totalTax.toFixed(3)}
            </td>
        </tr>

        <tr>
            <td>Extra Tax Payable</td>
            <td class="red">
                ₹${extraTax.toFixed(3)}
            </td>
        </tr>

        <tr>
            <td>TDS Refund</td>
            <td class="green">
                ₹${refund.toFixed(3)}
            </td>
        </tr>

    `;

    // RANGE TABLE

    let rangeHTML = "";

    for(let p=2; p<=approxMaxNoTax; p+=0.25){

        let t = p/100;

        let sAmt = buyAmount * (1+t);

        let sFee = sAmt * sellFee;
        let sTDS = sAmt * sellTDS;

        let totalTDS2 = buyTDSAmt + sTDS;

        let imm =
            sAmt
            - sFee
            - sTDS
            - buyFeeAmt
            - buyTDSAmt;

        let diff = imm - buyAmount;

        let diffPercent =
            (diff / buyAmount) * 100;

        let gp = sAmt - buyAmount;

        let tax = gp * taxRate;

        let ex = Math.max(0, tax-totalTDS2);

        let ref = Math.max(0, totalTDS2-tax);

        if(ex <= 0){

            rangeHTML += `

            <tr>

                <td>${p.toFixed(2)}%</td>

                <td class="${diff>=0?'green':'red'}">
                    ₹${diff.toFixed(3)}
                </td>

                <td class="${diffPercent>=0?'green':'red'}">
                    ${diffPercent>=0?'+':''}${diffPercent.toFixed(3)}%
                </td>

                <td>
                    ₹${imm.toFixed(3)}
                </td>

                <td>
                    ₹${totalTDS2.toFixed(3)}
                </td>

                <td>
                    ₹${tax.toFixed(3)}
                </td>

                <td class="green">
                    ₹0
                </td>

                <td class="green">
                    ₹${ref.toFixed(3)}
                </td>

            </tr>

            `;
        }

    }

    document.getElementById("rangeTable").innerHTML = rangeHTML;

}

document.querySelectorAll("input").forEach(el=>{
    el.addEventListener("input",calc);
});

calc();

</script>
